version: v1
name: java-generated-client-manifest
title: Java Generated Client Manifest
status: manifest-only
description: Manifest for future Java generated clients. No generated client code is committed by this file.
consumer_target: ginsengfood-business-platform
allowed_source_contracts:
  - ../../openapi/business-platform/*.v1.yaml
  - ../../asyncapi/business-platform-events.v1.yaml
  - ../../schemas/common/*.schema.json
  - ../../schemas/commerce/*.schema.json
  - ../../schemas/channel/*.schema.json
  - ../../schemas/ai/*.schema.json
  - ../../schemas/ads/*.schema.json
  - ../../schemas/live/*.schema.json
  - ../../schemas/ivr/*.schema.json
disallowed_content:
  - generated-client-code
  - handwritten-implementation
  - maven-or-gradle-artifact
  - binary-build-output
  - secrets
  - service-logic
compatibility:
  breaking_change: Generated Java clients must not be committed or published until generator and compatibility policy are approved.
todos:
  - Choose generator, package name, Spring compatibility policy, publishing flow, and regeneration command.
