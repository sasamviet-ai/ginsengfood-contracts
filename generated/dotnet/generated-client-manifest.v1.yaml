version: v1
name: dotnet-generated-client-manifest
title: .NET Generated Client Manifest
status: manifest-only
description: Manifest for future .NET generated clients. No generated client code is committed by this file.
consumer_target: ginsengfood-ops-core
allowed_source_contracts:
  - ../../openapi/ops-core/*.v1.yaml
  - ../../asyncapi/ops-core-events.v1.yaml
  - ../../schemas/common/*.schema.json
  - ../../schemas/product/*.schema.json
  - ../../schemas/ops/*.schema.json
disallowed_content:
  - generated-client-code
  - handwritten-implementation
  - nuget-package
  - binary-build-output
  - secrets
  - service-logic
compatibility:
  breaking_change: Generated .NET clients must not be committed or published until generator and compatibility policy are approved.
todos:
  - Choose generator, package name, namespace policy, publishing flow, and regeneration command.
