version: v1
language: typescript
status: manifest-only
validation_command: node ../../scripts/validate-contracts.mjs
source_documents:
  - docs/source-map.md
policy:
  generate_sdk: false
  reason: SDK generator and distribution workflow are not owner-approved.
  allowed_now:
    - Track OpenAPI and schema inputs.
    - Record generation assumptions.
    - Keep this manifest synchronized with contract validation.
  disallowed_now:
    - Commit generated SDK code.
    - Publish packages.
    - Treat generated clients as compatibility evidence before CI approval.
