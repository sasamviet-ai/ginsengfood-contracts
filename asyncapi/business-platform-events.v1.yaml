asyncapi: 2.6.0
info:
  title: GinsengFood Business Platform Events
  version: 1.0.0
  description: AsyncAPI v1 contract for events published by business-platform. This
    is a placeholder contract and does not define real broker configuration.
servers:
  placeholder:
    url: message-broker.example.local
    protocol: amqp
    description: Placeholder only. Not a real broker configuration.
channels:
  business-platform.order.order-created.v1:
    description: Published when an Official Order is created after valid QuoteSnapshot,
      Order Draft, and Customer Confirmation. It is not paid or verified revenue by
      itself.
    publish:
      summary: business-platform publishes order-created.v1.
      operationId: orderCreatedV1
      message:
        $ref: '#/components/messages/orderCreatedV1Message'
  business-platform.order.order-confirmed.v1:
    description: Published when business-platform confirms an Official Order. Payload
      carries order id, order code, customer confirmation, and quote snapshot references
      for ops-core fulfillment boundary.
    publish:
      summary: business-platform publishes order-confirmed.v1.
      operationId: orderConfirmedV1
      message:
        $ref: '#/components/messages/orderConfirmedV1Message'
  business-platform.order.order-cancelled.v1:
    description: Published when the Core Order State Machine has cancelled the official
      order. IVR alone must not publish this state.
    publish:
      summary: business-platform publishes order-cancelled.v1.
      operationId: orderCancelledV1
      message:
        $ref: '#/components/messages/orderCancelledV1Message'
  business-platform.order.order-paid.v1:
    description: Published when payment is confirmed by a valid owner source. A transfer
      image or payment pending state is not paid.
    publish:
      summary: business-platform publishes order-paid.v1.
      operationId: orderPaidV1
      message:
        $ref: '#/components/messages/orderPaidV1Message'
  business-platform.order.order-ready-for-fulfillment.v1:
    description: Published when an official order is ready to be handed to fulfillment
      consumers. Ops-core must still enforce sellable, stock, sale-lock, recall, and
      trace boundaries.
    publish:
      summary: business-platform publishes order-ready-for-fulfillment.v1.
      operationId: orderReadyForFulfillmentV1
      message:
        $ref: '#/components/messages/orderReadyForFulfillmentV1Message'
  business-platform.order.order-delivered.v1:
    description: Published when delivery status reaches delivered according to the
      shipping/order owner. Delivery alone is not ads verified revenue unless VerifiedRevenue
      rules pass.
    publish:
      summary: business-platform publishes order-delivered.v1.
      operationId: orderDeliveredV1
      message:
        $ref: '#/components/messages/orderDeliveredV1Message'
  business-platform.payment.payment-reference-created.v1:
    description: Published when a payment reference is created for an official order.
      It is not paid confirmation.
    publish:
      summary: business-platform publishes payment-reference-created.v1.
      operationId: paymentReferenceCreatedV1
      message:
        $ref: '#/components/messages/paymentReferenceCreatedV1Message'
  business-platform.payment.payment-confirmed.v1:
    description: Published when payment or collection is confirmed by the payment/accounting
      owner. This can feed verified revenue review but does not create ops-core truth.
    publish:
      summary: business-platform publishes payment-confirmed.v1.
      operationId: paymentConfirmedV1
      message:
        $ref: '#/components/messages/paymentConfirmedV1Message'
  business-platform.payment.payment-failed.v1:
    description: Published when payment fails or is rejected by owner review. Failure
      must not be treated as cancellation unless Core Order State Machine decides
      it.
    publish:
      summary: business-platform publishes payment-failed.v1.
      operationId: paymentFailedV1
      message:
        $ref: '#/components/messages/paymentFailedV1Message'
  business-platform.shipping.shipping-created.v1:
    description: Published when a shipping contract is created for order/draft eligibility.
      Carrier/tracking fields remain bounded by source documents.
    publish:
      summary: business-platform publishes shipping-created.v1.
      operationId: shippingCreatedV1
      message:
        $ref: '#/components/messages/shippingCreatedV1Message'
  business-platform.shipping.shipping-status-changed.v1:
    description: Published when shipping status changes. Tracking status does not
      mutate order/payment/revenue by itself.
    publish:
      summary: business-platform publishes shipping-status-changed.v1.
      operationId: shippingStatusChangedV1
      message:
        $ref: '#/components/messages/shippingStatusChangedV1Message'
  business-platform.shipping.delivery-issue-opened.v1:
    description: Published when a delivery issue is opened. It must not become cancellation,
      refund, or verified revenue without owner state transitions.
    publish:
      summary: business-platform publishes delivery-issue-opened.v1.
      operationId: deliveryIssueOpenedV1
      message:
        $ref: '#/components/messages/deliveryIssueOpenedV1Message'
  business-platform.demand.sales-demand-created.v1:
    description: Published when sales demand is created for ops-core review. Sales
      demand must not create Production Order directly and must respect Sale Lock/Recall/Hold.
    publish:
      summary: business-platform publishes sales-demand-created.v1.
      operationId: salesDemandCreatedV1
      message:
        $ref: '#/components/messages/salesDemandCreatedV1Message'
  business-platform.demand.campaign-demand-forecasted.v1:
    description: Published when campaign demand is forecasted. Forecast is planning
      input only and cannot bypass MRP, stock, sale-lock, or owner approval.
    publish:
      summary: business-platform publishes campaign-demand-forecasted.v1.
      operationId: campaignDemandForecastedV1
      message:
        $ref: '#/components/messages/campaignDemandForecastedV1Message'
  business-platform.demand.dealer-order-demand-created.v1:
    description: Published when dealer/distributor order demand is created for ops-core
      review. It must not become production order without MRP/owner checks.
    publish:
      summary: business-platform publishes dealer-order-demand-created.v1.
      operationId: dealerOrderDemandCreatedV1
      message:
        $ref: '#/components/messages/dealerOrderDemandCreatedV1Message'
  business-platform.ads.verified-revenue-created.v1:
    description: Published only by business-platform/commerce when revenue is verified.
      Ops-core must not emit VerifiedRevenueCreated, and Ads must not use quote/cart/draft/unpaid/pending
      as revenue.
    publish:
      summary: business-platform publishes verified-revenue-created.v1.
      operationId: verifiedRevenueCreatedV1
      message:
        $ref: '#/components/messages/verifiedRevenueCreatedV1Message'
  business-platform.ads.attribution-resolved.v1:
    description: Published when attribution conflict is resolved or an owner-approved
      attribution rule is applied. Unresolved conflicts must not feed official ROAS.
    publish:
      summary: business-platform publishes attribution-resolved.v1.
      operationId: attributionResolvedV1
      message:
        $ref: '#/components/messages/attributionResolvedV1Message'
  business-platform.ads.scale-gate-decision-created.v1:
    description: Published when a scale gate decision is created. Scale gate is not
      an automatic budget increase and requires owner decision.
    publish:
      summary: business-platform publishes scale-gate-decision-created.v1.
      operationId: scaleGateDecisionCreatedV1
      message:
        $ref: '#/components/messages/scaleGateDecisionCreatedV1Message'
  business-platform.ivr.ivr-confirmation-requested.v1:
    description: Published when IVR order confirmation is requested for an eligible
      Official Order only. It must not run for Quote, Cart, or Order Draft.
    publish:
      summary: business-platform publishes ivr-confirmation-requested.v1.
      operationId: ivrConfirmationRequestedV1
      message:
        $ref: '#/components/messages/ivrConfirmationRequestedV1Message'
  business-platform.ivr.ivr-confirmed.v1:
    description: Published when IVR result is confirmed by the customer. It is an
      input signal only and must pass Core Order State Machine.
    publish:
      summary: business-platform publishes ivr-confirmed.v1.
      operationId: ivrConfirmedV1
      message:
        $ref: '#/components/messages/ivrConfirmedV1Message'
  business-platform.ivr.ivr-customer-cancelled.v1:
    description: Published when customer cancellation is captured by IVR. It is input
      signal only; Core Order State Machine decides final cancellation and Notification
      owner sends notice only after official cancellation.
    publish:
      summary: business-platform publishes ivr-customer-cancelled.v1.
      operationId: ivrCustomerCancelledV1
      message:
        $ref: '#/components/messages/ivrCustomerCancelledV1Message'
  business-platform.ivr.ivr-no-answer-final.v1:
    description: Published when IVR reaches final no-answer under the active program policy.
      It is input signal only and does not send notification by itself.
    publish:
      summary: business-platform publishes ivr-no-answer-final.v1.
      operationId: ivrNoAnswerFinalV1
      message:
        $ref: '#/components/messages/ivrNoAnswerFinalV1Message'
  business-platform.ivr.ivr-invalid-phone-final.v1:
    description: Published when official contact phone validation reaches invalid-phone
      final. It is not no-answer.
    publish:
      summary: business-platform publishes ivr-invalid-phone-final.v1.
      operationId: ivrInvalidPhoneFinalV1
      message:
        $ref: '#/components/messages/ivrInvalidPhoneFinalV1Message'
  business-platform.ivr.ivr-technical-exception.v1:
    description: Published when IVR captures a technical exception that does not count
      as customer no-answer.
    publish:
      summary: business-platform publishes ivr-technical-exception.v1.
      operationId: ivrTechnicalExceptionV1
      message:
        $ref: '#/components/messages/ivrTechnicalExceptionV1Message'
  business-platform.ivr.ivr-operational-blocked.v1:
    description: Published when Order Core or owner revalidation blocks IVR progression.
    publish:
      summary: business-platform publishes ivr-operational-blocked.v1.
      operationId: ivrOperationalBlockedV1
      message:
        $ref: '#/components/messages/ivrOperationalBlockedV1Message'
  business-platform.ivr.ivr-capacity-incident-opened.v1:
    description: Published when IVR opens a queue, SIM channel, or adapter capacity incident.
    publish:
      summary: business-platform publishes ivr-capacity-incident-opened.v1.
      operationId: ivrCapacityIncidentOpenedV1
      message:
        $ref: '#/components/messages/ivrCapacityIncidentOpenedV1Message'
