version: v1
name: contract-script-manifest
title: Contract Script Manifest
status: active-validation
description: Manifest for contract lifecycle scripts.
active_scripts:
  - name: validate-contracts
    command: node scripts/validate-contracts.mjs
    purpose: Validate contract repository hygiene, JSON parseability, JSON Schema metadata, local references, OpenAPI/AsyncAPI surface markers, source-map paths, YAML source_documents, event envelopes, fixture targets, and basic fixture required fields.
future_scripts:
  - name: validate-openapi-strict
    purpose: Validate OpenAPI 3.1.0 semantics with an approved OpenAPI validator.
  - name: validate-yaml-strict
    purpose: Validate YAML syntax with an approved parser package.
  - name: validate-asyncapi-strict
    purpose: Validate AsyncAPI semantics with an approved AsyncAPI validator.
  - name: validate-json-schema-strict
    purpose: Validate JSON Schema draft 2020-12 syntax and examples with an approved JSON Schema validator.
  - name: check-breaking-changes
    purpose: Compare contract changes against compatibility policy.
  - name: generate-dotnet-client
    purpose: Generate .NET clients only after generated-client policy is approved.
  - name: generate-java-client
    purpose: Generate Java clients only after generated-client policy is approved.
  - name: generate-typescript-client
    purpose: Generate TypeScript clients only after generated-client policy is approved.
disallowed_content:
  - business-logic
  - service-logic
  - database-migration
  - production-config
  - secrets
todos:
  - Choose strict validation packages, CI entrypoint, generator versions, and generated-client publishing policy.
