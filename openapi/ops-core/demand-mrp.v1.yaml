openapi: 3.1.0
info:
  title: Ops Core Demand MRP API
  version: 1.0.0
  description: Demand and MRP v1 API contract for production planning, material requirements, and procurement suppression boundaries.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/demands:
    get:
      summary: List production demands
      description: "Lists demand records for ops-core planning views. TODO: source documents do not lock demand filter fields."
      operationId: listDemandsV1
      tags: [demand-mrp]
      responses:
        "200":
          description: Demand list wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../../schemas/ops/demand.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      summary: Create production demand
      description: Creates a demand contract record. Stock alert may create demand, but demand must not directly create Production Order without owner/planning boundary.
      operationId: createDemandV1
      tags: [demand-mrp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/demand.schema.json"
      responses:
        "201":
          description: Demand created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/demand.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/mrp-runs:
    post:
      summary: Start MRP run
      description: Creates an MRP run contract. This API declares the boundary only; calculation logic is outside contracts.
      operationId: createMrpRunV1
      tags: [demand-mrp]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/mrp-run.schema.json"
      responses:
        "201":
          description: MRP run created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/mrp-run.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/mrp-runs/{mrpRunId}/material-requirements:
    get:
      summary: List material requirements for MRP run
      description: "Returns material requirements derived for an MRP run. TODO: source documents do not lock procurement exception filters."
      operationId: listMaterialRequirementsV1
      tags: [demand-mrp]
      parameters:
        - name: mrpRunId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Material requirements wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../../schemas/ops/material-requirement.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
