openapi: 3.1.0
info:
  title: Ops Core Product Activation API
  version: 1.0.0
  description: Product Activation v1 API contract. Product Activation makes product configuration ready; it does not make SKU sellable.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/product-activations:
    post:
      summary: Create product activation record
      description: "Creates a Product Activation contract record for ops-core control. This is not a sellable mutation; sellable belongs to Operational Core guards. TODO: source documents do not lock the final activation command fields beyond schema."
      operationId: createProductActivationV1
      tags: [product-activation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/product/product-activation.schema.json"
      responses:
        "201":
          description: Product activation created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/product/product-activation.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/product-activations/{activationId}:
    get:
      summary: Get product activation
      description: Returns one Product Activation record.
      operationId: getProductActivationV1
      tags: [product-activation]
      parameters:
        - name: activationId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Product activation wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/product/product-activation.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/skus/{skuId}/activation:
    get:
      summary: Get SKU activation state
      description: Returns activation state for a SKU. Consumers must still call sellable/availability APIs before sale or quote.
      operationId: getSkuActivationV1
      tags: [product-activation, sku]
      parameters:
        - name: skuId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Product activation wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/product/product-activation.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
