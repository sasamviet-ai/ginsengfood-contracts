openapi: 3.1.0
info:
  title: Ops Core Material Issue API
  version: 1.0.0
  description: Material Issue and Material Receipt v1 API contract for production material movements.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/material-issues:
    post:
      summary: Create material issue
      description: Creates material issue contract data for production. This is an inventory-affecting command and must carry audit/evidence according to source docs.
      operationId: createMaterialIssueV1
      tags: [material-issue]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/material-issue.schema.json"
      responses:
        "201":
          description: Material issue created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/material-issue.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/material-issues/{materialIssueId}:
    get:
      summary: Get material issue
      description: Returns one material issue record.
      operationId: getMaterialIssueV1
      tags: [material-issue]
      parameters:
        - name: materialIssueId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Material issue wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/material-issue.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/material-receipts:
    post:
      summary: Create material receipt
      description: "Creates material receipt contract data for production returns/receipts. TODO: source documents do not lock all receipt reason values."
      operationId: createMaterialReceiptV1
      tags: [material-issue]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/material-receipt.schema.json"
      responses:
        "201":
          description: Material receipt created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/material-receipt.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
