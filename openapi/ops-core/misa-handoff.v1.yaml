openapi: 3.1.0
info:
  title: Ops Core MISA Handoff API
  version: 1.0.0
  description: MISA Handoff v1 API contract for operational checkpoint handoff to accounting integration with mapping, sync, reconcile, audit, evidence, and idempotency.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/misa-handoffs:
    get:
      summary: List MISA handoffs
      description: "Lists MISA handoff records for ops-core and integration review. TODO: source documents do not lock final filter parameters."
      operationId: listMisaHandoffsV1
      tags: [misa-handoff]
      responses:
        "200":
          description: MISA handoffs wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../../schemas/ops/misa-handoff.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      summary: Create MISA handoff
      description: Creates a MISA handoff from a valid operational checkpoint. This API must not invent accounting postings or bypass mapping/sync/reconcile status.
      operationId: createMisaHandoffV1
      tags: [misa-handoff]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/misa-handoff.schema.json"
      responses:
        "201":
          description: MISA handoff created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/misa-handoff.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/misa-handoffs/{misaHandoffId}:
    get:
      summary: Get MISA handoff
      description: Returns one MISA handoff record with mapping, sync, and reconcile status.
      operationId: getMisaHandoffV1
      tags: [misa-handoff]
      parameters:
        - name: misaHandoffId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: MISA handoff wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/misa-handoff.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
