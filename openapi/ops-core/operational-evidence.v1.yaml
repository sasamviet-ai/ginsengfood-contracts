openapi: 3.1.0
info:
  title: Ops Core Operational Evidence API
  version: 1.0.0
  description: Operational Evidence and Operational Form v1 API contract for evidence-bound operational records and generated forms.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/operational-evidence:
    post:
      summary: Create operational evidence
      description: Creates operational evidence contract data for an ops-core object or form. Evidence must be source-linked and audit-safe.
      operationId: createOperationalEvidenceV1
      tags: [operational-evidence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/operational-evidence.schema.json"
      responses:
        "201":
          description: Operational evidence created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/operational-evidence.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/operational-evidence/{operationalEvidenceId}:
    get:
      summary: Get operational evidence
      description: Returns one operational evidence record.
      operationId: getOperationalEvidenceV1
      tags: [operational-evidence]
      parameters:
        - name: operationalEvidenceId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Operational evidence wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/operational-evidence.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/operational-forms/{formId}:
    get:
      summary: Get operational form
      description: Returns an operational form contract record, including generated form code, source object, auto-generated fields, and evidence when available.
      operationId: getOperationalFormV1
      tags: [operational-evidence]
      parameters:
        - name: formId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Operational form wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/operational-form.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
