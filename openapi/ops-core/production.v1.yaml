openapi: 3.1.0
info:
  title: Ops Core Production API
  version: 1.0.0
  description: Production v1 API contract for production orders, BOM snapshots, and execution records.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/production-orders:
    post:
      summary: Create production order
      description: Creates a Production Order contract record from valid demand/planning inputs. It must carry or reference a BOM snapshot; recipe/BOM changes must not silently change existing production orders.
      operationId: createProductionOrderV1
      tags: [production]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/production-order.schema.json"
      responses:
        "201":
          description: Production order created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/production-order.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/production-orders/{productionOrderId}:
    get:
      summary: Get production order
      description: Returns one Production Order contract record.
      operationId: getProductionOrderV1
      tags: [production]
      parameters:
        - name: productionOrderId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Production order wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/production-order.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/production-orders/{productionOrderId}/bom-snapshot:
    get:
      summary: Get production BOM snapshot
      description: Returns the immutable BOM snapshot used by a Production Order.
      operationId: getProductionBomSnapshotV1
      tags: [production]
      parameters:
        - name: productionOrderId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Production BOM snapshot wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/production-bom-snapshot.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/production-executions:
    post:
      summary: Record production execution
      description: "Records production execution contract data. TODO: source documents do not lock every execution step transition for OpenAPI."
      operationId: createProductionExecutionV1
      tags: [production]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/production-execution.schema.json"
      responses:
        "201":
          description: Production execution created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/production-execution.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
