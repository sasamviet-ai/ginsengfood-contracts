openapi: 3.1.0
info:
  title: Ops Core Warehouse API
  version: 1.0.0
  description: Warehouse v1 API contract for warehouses, locations, and warehouse receipt confirmation boundaries.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/warehouses:
    get:
      summary: List warehouses
      description: "Lists warehouse records. TODO: source documents do not lock warehouse type/location taxonomy."
      operationId: listWarehousesV1
      tags: [warehouse]
      responses:
        "200":
          description: Warehouses wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../../schemas/ops/warehouse.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/warehouse-locations:
    get:
      summary: List warehouse locations
      description: Lists warehouse location records.
      operationId: listWarehouseLocationsV1
      tags: [warehouse]
      responses:
        "200":
          description: Warehouse locations wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "../../schemas/ops/warehouse-location.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/warehouse-receipts:
    post:
      summary: Create warehouse receipt
      description: Creates a warehouse receipt contract record. Confirmed warehouse receipt is one input to sellable status.
      operationId: createWarehouseReceiptV1
      tags: [warehouse]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/ops/warehouse-receipt.schema.json"
      responses:
        "201":
          description: Warehouse receipt created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/ops/warehouse-receipt.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
