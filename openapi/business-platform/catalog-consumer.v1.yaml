openapi: 3.1.0
info:
  title: Business Platform Catalog Consumer API
  version: 1.0.0
  description: >-
    Catalog consumer v1 contract for business-platform to consume ops-core public catalog data.
    The source-of-truth remains ops-core; this API must not mutate Product Master or SKU truth.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/catalog/skus/{skuId}/public:
    get:
      summary: Get public SKU catalog projection
      description: >-
        Reserved adapter boundary for public-safe SKU data consumed from ops-core.
        TODO: final response schema belongs to ops-core Product/SKU public projection and is not defined in Phase 3 business-platform schemas.
      operationId: getCatalogSkuPublicV1
      tags: [catalog-consumer]
      x-internal-status: reserved
      parameters:
        - name: skuId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Public catalog payload wrapped in the common envelope.
          content:
            application/json:
              schema:
                $ref: "../../schemas/common/envelope.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/catalog/skus/{skuId}/operational-status:
    get:
      summary: Get SKU operational status projection
      description: >-
        Reserved adapter boundary for ops-core operational status consumed by business-platform.
        Business-platform may read sellable/stock/recall/sale-lock facts but must not mutate them.
        TODO: use ops-core public operational-status schema when it is versioned for cross-system consumption.
      operationId: getCatalogSkuOperationalStatusV1
      tags: [catalog-consumer]
      x-internal-status: reserved
      parameters:
        - name: skuId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Operational status payload wrapped in the common envelope.
          content:
            application/json:
              schema:
                $ref: "../../schemas/common/envelope.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
