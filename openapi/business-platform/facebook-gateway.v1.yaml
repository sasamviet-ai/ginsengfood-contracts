openapi: 3.1.0
info:
  title: GinsengFood Business Platform Facebook Gateway API
  version: 1.0.0
  description: >
    v1 contract for Facebook channel context, public-to-private handoff,
    human takeover, and channel delivery. The gateway preserves the public and
    private boundary and must pause automation during human takeover.
servers:
  - url: https://api.example.local
    description: Placeholder only.
tags:
  - name: Facebook Gateway
paths:
  /v1/facebook-gateway/channel-contexts:
    post:
      tags:
        - Facebook Gateway
      summary: Capture channel context
      description: >
        Captures public/private channel context for downstream AI and commerce
        handoff. Public responses must not expose private data.
      operationId: createFacebookChannelContextV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/channel/channel-context.schema.json
      responses:
        "200":
          description: Channel context contract.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/common/envelope.schema.json
                  - type: object
                    properties:
                      data:
                        $ref: ../../schemas/channel/channel-context.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/facebook-gateway/comment-to-messenger-handoffs:
    post:
      tags:
        - Facebook Gateway
      summary: Handoff public comment to private messenger
      description: >
        Creates a comment-to-messenger handoff while preserving public/private
        visibility. A failed private handoff must not be treated as a successful
        delivery.
      operationId: createCommentToMessengerHandoffV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/channel/comment-to-messenger-handoff.schema.json
      responses:
        "200":
          description: Comment to messenger handoff contract.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/common/envelope.schema.json
                  - type: object
                    properties:
                      data:
                        $ref: ../../schemas/channel/comment-to-messenger-handoff.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/facebook-gateway/human-takeovers:
    post:
      tags:
        - Facebook Gateway
      summary: Record human takeover
      description: >
        Records that a human operator has taken over the conversation. AI and
        automated delivery must respect the takeover state.
      operationId: createHumanTakeoverV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/channel/human-takeover.schema.json
      responses:
        "200":
          description: Human takeover contract.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/common/envelope.schema.json
                  - type: object
                    properties:
                      data:
                        $ref: ../../schemas/channel/human-takeover.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /v1/facebook-gateway/channel-deliveries:
    post:
      tags:
        - Facebook Gateway
      summary: Record channel delivery
      description: >
        Records delivery state for a public or private channel message. Delivery
        status does not prove customer confirmation, payment, or revenue.
      operationId: createChannelDeliveryV1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../../schemas/channel/channel-delivery.schema.json
      responses:
        "200":
          description: Channel delivery contract.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: ../../schemas/common/envelope.schema.json
                  - type: object
                    properties:
                      data:
                        $ref: ../../schemas/channel/channel-delivery.schema.json
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  responses:
    BadRequest:
      description: Invalid request syntax or parameters.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    Unauthorized:
      description: Authentication is required.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    Forbidden:
      description: Caller is not allowed to perform this operation.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    UnprocessableEntity:
      description: Request is syntactically valid but violates contract validation.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
    InternalServerError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: ../../schemas/common/error.schema.json
