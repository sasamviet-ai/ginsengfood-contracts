openapi: 3.1.0
info:
  title: Business Platform Order API
  version: 1.0.0
  description: >-
    Order v1 API contract for Order Draft, Customer Confirmation, and Official Order.
    Official Order requires valid QuoteSnapshot, complete Order Draft, and Customer Confirmation.
servers:
  - url: https://api.example.local
    description: Placeholder only.
paths:
  /v1/order-drafts:
    post:
      summary: Create order draft
      description: Creates an Order Draft. Order Draft is temporary and must not issue official order code.
      operationId: createOrderDraftV1
      tags: [order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/commerce/order-draft.schema.json"
      responses:
        "201":
          description: Order Draft created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/commerce/order-draft.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/customer-confirmations:
    post:
      summary: Record customer confirmation
      description: Records Customer Confirmation for an Order Draft. Confirmation is required before Official Order creation.
      operationId: createCustomerConfirmationV1
      tags: [order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/commerce/customer-confirmation.schema.json"
      responses:
        "201":
          description: Customer Confirmation created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/commerce/customer-confirmation.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/orders:
    post:
      summary: Create official order
      description: Creates an Official Order after valid QuoteSnapshot, Order Draft, Customer Confirmation, payment method, and shipping checks.
      operationId: createOfficialOrderV1
      tags: [order]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "../../schemas/commerce/order.schema.json"
      responses:
        "201":
          description: Official Order created and wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/commerce/order.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /v1/orders/{orderId}:
    get:
      summary: Get official order
      description: Returns one Official Order. Official Order is not verified revenue until verification and payment/collection confirmation pass.
      operationId: getOfficialOrderV1
      tags: [order]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string, minLength: 1 }
      responses:
        "200":
          description: Official Order wrapped in the common envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../schemas/common/envelope.schema.json"
                  - type: object
                    properties:
                      data:
                        $ref: "../../schemas/commerce/order.schema.json"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
components:
  schemas:
    ErrorEnvelope:
      allOf:
        - $ref: "../../schemas/common/envelope.schema.json"
        - type: object
          properties:
            error:
              $ref: "../../schemas/common/error.schema.json"
  responses:
    BadRequest: { description: Bad request., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Unauthorized: { description: Authentication required., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Forbidden: { description: Permission denied., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    NotFound: { description: Resource not found., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    Conflict: { description: State conflict or idempotency conflict., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    UnprocessableEntity: { description: Validation or guard failure., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
    InternalServerError: { description: Internal server error., content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
