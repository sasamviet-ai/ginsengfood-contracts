version: v1
name: ivr-technical-exception-type
title: IVR Technical Exception Type
description: IVR v1 technical exception categories for failures that must not be treated as no-answer.
source_documents:
  - docs/documents/2. pack/09-PACK-09-IVR-ORDER-CONFIRMATION.md
  - docs/documents/3. tech/10-TECH-09-IVR-ORDER-CONFIRMATION-AUTO-CALL-VERIFICATION-ANTI-FAKE-ORDER-CONTROL.md
  - docs/documents/4. phase/phase-8/IVR-06-internal-sim-gateway-adapter.md
  - docs/documents/4. phase/phase-8/IVR-07-result-normalization-order-core-callback.md
values:
  - value: IVR_TECHNICAL_EXCEPTION
    description: Generic IVR technical exception.
  - value: IVR_CAPACITY_EXCEPTION
    description: Capacity exception.
  - value: SIM_GATEWAY_ERROR
    description: Internal SIM gateway adapter error.
  - value: SIM_CHANNEL_FAILURE
    description: SIM channel cannot be reserved, dialed, or kept healthy.
  - value: PROVIDER_FAILURE
    description: Telephony provider or low-level call failure.
  - value: INTERNAL_CALLBACK_ERROR
    description: Result callback could not be delivered or accepted by Order Core for technical reasons.
  - value: EVIDENCE_WRITE_ERROR
    description: Evidence or audit record could not be stored.
  - value: PHONE_VALIDATION_TECHNICAL_ERROR
    description: Phone validation service failed without proving the phone invalid.
  - value: POLICY_SOURCE_UNAVAILABLE
    description: Required policy or revalidation source was unavailable.
compatibility:
  breaking_change: Treating these exception types as customer no-answer or customer cancellation is breaking.
todos: []
