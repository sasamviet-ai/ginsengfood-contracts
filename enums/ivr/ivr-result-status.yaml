version: v1
name: ivr-result-status
title: IVR Result Status
description: IVR v1 result and outcome values for order confirmation signals.
source_documents:
  - docs/documents/2. pack/09-PACK-09-IVR-ORDER-CONFIRMATION.md
  - docs/documents/3. tech/10-TECH-09-IVR-ORDER-CONFIRMATION-AUTO-CALL-VERIFICATION-ANTI-FAKE-ORDER-CONTROL.md
  - docs/documents/4. phase/phase-8/IVR-07-result-normalization-order-core-callback.md
values:
  - value: IVR_CONFIRMED
    description: Customer pressed the confirm key; Order Core must still revalidate before confirming the order.
  - value: IVR_CUSTOMER_CANCELLED
    description: Customer pressed the cancel key; Order Core decides final cancellation and notification.
  - value: CUSTOMER_CANCELLED_BY_IVR_KEY_0
    description: Legacy-compatible cancellation reason from IVR key 0.
    alias_of: IVR_CUSTOMER_CANCELLED
  - value: NO_ANSWER
    description: Valid no-answer outcome for a non-final customer-counted attempt.
  - value: IVR_NO_ANSWER_ATTEMPT
    description: Non-final no-answer attempt signal.
    alias_of: NO_ANSWER
  - value: IVR_NO_ANSWER_FINAL
    description: Final no-answer after the program-specific customer attempt policy is exhausted.
  - value: NO_ANSWER_MAX_ATTEMPT_REACHED
    description: Legacy-compatible no-answer final handoff to Core Order State Machine.
    alias_of: IVR_NO_ANSWER_FINAL
  - value: IVR_NO_ANSWER_AFTER_PROGRAM_ATTEMPTS
    description: Legacy-compatible no-answer after the active program attempts are exhausted.
    alias_of: IVR_NO_ANSWER_FINAL
  - value: IVR_NO_ANSWER_AFTER_2_ATTEMPTS
    description: Golden Hour final no-answer after two valid customer-counted attempts.
    alias_of: IVR_NO_ANSWER_FINAL
  - value: IVR_NO_ANSWER_AFTER_3_ATTEMPTS
    description: 24/7 final no-answer after three valid customer-counted attempts.
    alias_of: IVR_NO_ANSWER_FINAL
  - value: INVALID_PHONE
    description: Phone is invalid based on resolver/provider evidence.
  - value: IVR_INVALID_PHONE_FINAL
    description: Final invalid-phone result after phone validation confirms the issue.
    alias_of: INVALID_PHONE_FINAL
  - value: INVALID_PHONE_FINAL
    description: Canonical Phase 8 final invalid-phone signal.
  - value: IVR_INVALID_PHONE_IF_RULE_CONFIRMED
    description: Legacy-compatible invalid-phone handoff once policy confirms the phone is invalid.
    alias_of: INVALID_PHONE_FINAL
  - value: IVR_CONFIRMATION_WINDOW_EXPIRED
    description: Confirmation window expired without an accepted customer result.
  - value: IVR_TECHNICAL_EXCEPTION
    description: IVR technical exception; not no-answer and not customer cancellation.
  - value: TECHNICAL_FAILURE
    description: Legacy-compatible technical failure outcome.
    alias_of: IVR_TECHNICAL_EXCEPTION
  - value: PROVIDER_FAILURE
    description: Legacy-compatible provider failure outcome.
    alias_of: IVR_TECHNICAL_EXCEPTION
  - value: IVR_CAPACITY_EXCEPTION
    description: Capacity exception; not no-answer and not customer cancellation.
  - value: IVR_OPERATIONAL_BLOCKED
    description: IVR result cannot advance because Order Core revalidation found Sale Lock, Recall, suppression, payment issue, opt-out, or another owner block.
  - value: IVR_POLICY_BLOCKED
    description: IVR run is blocked by policy before or during execution.
  - value: IVR_CUSTOMER_NEEDS_SUPPORT
    description: Customer input indicates manual support or review is needed.
  - value: IVR_RESULT_CALLBACK_ACCEPTED
    description: Order Core accepted the callback as an input signal for revalidation.
  - value: IVR_RESULT_CALLBACK_REJECTED_STALE
    description: Order Core rejected the callback because the order, task, or idempotency version is stale.
  - value: BUSY
    description: Busy signal; must not be auto-grouped into no-answer unless the active policy defines it.
  - value: REJECTED
    description: Rejected call; must not be auto-grouped into no-answer unless the active policy defines it.
  - value: UNREACHABLE
    description: Unreachable call; must not be auto-grouped into no-answer unless the active policy defines it.
compatibility:
  breaking_change: Treating technical exception, capacity exception, invalid phone, busy, rejected, unreachable, or operational block as customer no-answer without policy is breaking.
todos: []
