version: v1
name: material-group
title: Material Group
description: Material and packaging groups used by MRP, stock alert, material master, and procurement suppression.
source_documents:
  - docs/documents/2_pack/operational_more/DANH_MUC_PHAN_NHOM_NGUYEN_LIEU_VAT_TU_2_V1_2_CLEAN_FINAL 3(1).md
values:
  - value: A1
    description: Central/specific 20 SKU ingredients, including Quan-Than-Ta-Su materials.
    source: Material grouping catalog.
  - value: A2
    description: Nutrition base and broth/base ingredients, including rice anchor where applicable.
    source: Material grouping catalog.
  - value: A3
    description: Seasoning and flavor materials.
    source: Material grouping catalog.
  - value: B1
    description: Level 1 packaging by SKU; initial planning buffer 7%.
    source: Material grouping catalog.
  - value: B2
    description: Box/carton level packaging by SKU; initial planning buffer 7%.
    source: Material grouping catalog.
  - value: B3
    description: Shared auxiliary materials controlled by stock policy, not default 7% buffer.
    source: Material grouping catalog.
compatibility:
  breaking_change: Removing or renaming material groups is breaking for BOM, MRP, procurement, and stock policy contracts.
todos:
  - Confirm whether higher-level GROUP_A/GROUP_B values are needed as separate contract values.
