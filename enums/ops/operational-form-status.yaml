version: v1
name: operational-form-status
title: Operational Form Status
description: Operational Form v1 status values for generated and operator-confirmed FRM-01 through FRM-27 forms.
source_documents:
  - docs/documents/0. appendices/01-OPERATIONAL-FORMS.md
  - docs/documents/0. appendices/02-AUTO-GENERATED-FORM-RULES.md
  - docs/documents/0. appendices/05-MATERIAL-PACKAGING-TAXONOMY.md
values:
  - value: AUTO_GENERATED_DRAFT
    description: Form draft was auto-generated by the system from source data.
    source: Auto-generated form rules.
  - value: DRAFT
    description: Draft form.
    source: Operational form lifecycle.
  - value: PENDING_CONFIRMATION
    description: Waiting for personal confirmation block.
    source: Operational Forms confirmation block.
  - value: SUBMITTED
    description: Form submitted for review or approval.
    source: Appendix operational screen status sections.
  - value: CONFIRMED
    description: Required confirmations are complete.
    source: Operational Forms confirmation block.
  - value: APPROVED
    description: Form approved for the next operational step.
    source: Appendix operational screen status sections.
  - value: PARTIALLY_APPROVED
    description: Material issue or approval form is partially approved.
    source: Material/packaging taxonomy operational screen status sections.
  - value: REJECTED
    description: Form rejected; reason and audit are required.
    source: Appendix operational screen status sections.
  - value: IN_PROGRESS
    description: Form or workforce step is in progress.
    source: Appendix operational screen status sections.
  - value: CHECKED_OUT
    description: Workforce check-out completed for the relevant order, batch, or step.
    source: Material/packaging taxonomy workforce screen status.
  - value: APPROVED_FOR_PACKING
    description: QC or process step approved for packing.
    source: Material/packaging taxonomy freeze-dry QC status.
  - value: APPROVED_FOR_WAREHOUSE
    description: Finished goods approved for warehouse receipt.
    source: Material/packaging taxonomy finished-goods QC status.
  - value: COMPLETED
    description: Form completed.
    source: Appendix operational screen status sections.
  - value: ACCOUNTED
    description: Accounting form has been accounted or posted through the accounting boundary.
    source: MISA/accounting appendix rules.
  - value: SYNC_AWAITING_REVIEW
    description: MISA/accounting sync is waiting for review.
    source: Material/packaging taxonomy accounting form status.
  - value: SYNC_SUCCESS
    description: MISA/accounting sync succeeded.
    source: Material/packaging taxonomy accounting form status.
  - value: SYNC_ERROR
    description: MISA/accounting sync failed.
    source: Material/packaging taxonomy accounting form status.
  - value: REVIEW_REQUIRED
    description: Review required before transition.
    source: Appendix operational review paths.
  - value: BLOCKED
    description: Form transition or action is blocked.
    source: Operational guard behavior.
  - value: CLOSED
    description: Form is closed.
    source: Conservative closure value; source does not lock full lifecycle.
  - value: CANCELLED
    description: Form is cancelled.
    source: Conservative terminal value; cancellation semantics require owner review if used in high-risk forms.
compatibility:
  breaking_change: Allowing transitions without required confirmations/evidence is breaking.
todos:
  - Define per-form state machines for FRM-01 through FRM-27 if the implementation needs stricter per-form transition matrices.
