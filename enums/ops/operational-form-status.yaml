version: v1
name: operational-form-status
title: Operational Form Status
description: Operational Form v1 status values for auto-generated forms FRM-01 through FRM-27.
source_documents:
  - docs/documents/2_pack/extra/HE THONG PHIEU - OPERATIONAL FORMS AUTO-GENERATED FORMS MISA ACCOUNTING HANDOFF PACK.md
  - docs/documents/2_pack/operational_more/PHIEU TU SINH IN KE TOAN HACH TOAN.md
  - docs/documents/2_pack/operational_more/BO KHOA 5 BUOC.md
values:
  - value: AUTO_GENERATED_DRAFT
    description: Form draft was auto-generated by the system from source data.
    source: Operational Forms auto-generated draft behavior.
  - value: DRAFT
    description: Draft form.
    source: Operational Forms draft behavior.
  - value: PENDING_CONFIRMATION
    description: Waiting for personal confirmation block.
    source: Operational Forms confirmation block.
  - value: CONFIRMED
    description: Required confirmations are complete.
    source: Operational Forms confirmation block.
  - value: REVIEW_REQUIRED
    description: Review required before transition.
    source: BỘ KHÓA 5 BƯỚC and PACK-01 review paths.
  - value: BLOCKED
    description: Form transition or action is blocked.
    source: Operational guard behavior.
  - value: CLOSED
    description: Form is closed.
    source: Conservative closure value; source does not lock full lifecycle.
  - value: CANCELLED
    description: Form is cancelled.
    source: TODO: cancellation semantics are not specified.
compatibility:
  breaking_change: Allowing transitions without required confirmations/evidence is breaking.
todos:
  - Define per-form state machines for FRM-01 through FRM-27 in Phase 7 if required.
