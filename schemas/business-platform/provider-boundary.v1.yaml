consumer_rules:
  - business-platform must consume ops-core sellable, stock, recall, sale-lock, and trace truth before quote/order/AI/channel/live selling flows.
  - QuoteSnapshot is pricing contract input; quote, cart, and order draft are not official order.
  - Payment must not be marked paid without a valid confirmation source.
  - Verified revenue must not be produced from raw funnel, quote, cart, draft, unpaid, pending, cancelled, or refunded states.
  - IVR result is input signal only; the core order state machine decides cancellation or human review.
compatibility:
  breaking_change: Treating business-platform runtime signals as ops-core operational truth, or bypassing ops-core sale-lock/recall/sellable truth, is breaking.
todos:
  - Source documents do not finalize all payment provider, shipping, customer PII, AI taxonomy, channel delivery, live, Ads, or IVR retry details.
