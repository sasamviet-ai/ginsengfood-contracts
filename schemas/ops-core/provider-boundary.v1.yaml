version: v1
name: ops-core-provider-boundary
title: Ops Core Provider Boundary
description: Contract boundary statement for ginsengfood-ops-core provider-owned schemas and consumer-facing data shapes.
provider: ops-core
source_documents:
  - docs/source-map.md
  - docs/documents/1. master/02-MASTER-01-SOURCE-OF-TRUTH.md
  - docs/documents/1. master/03-MASTER-02-CROSS-PACK-DEPENDENCY.md
  - docs/documents/2. pack/01-PACK-01-OPERATIONAL-CORE.md
  - docs/documents/2. pack/02-PACK-02-PRODUCT-MASTER-SKU-RECIPE-ACTIVATION.md
  - docs/documents/2. pack/03-PACK-03-DEMAND-MRP-PROCUREMENT-MATERIAL-CONTROL.md
  - docs/documents/2. pack/04-PACK-04-MISA-ACCOUNTING-HANDOFF.md
  - docs/documents/3. tech/03-TECH-02-PRODUCT-SKU-INGREDIENT-RECIPE-FORMULA-PRODUCT-ACTIVATION.md
  - docs/documents/3. tech/04-TECH-03-OPERATIONAL-CORE-PRODUCTION-WAREHOUSE-INVENTORY-TRACEABILITY-RECALL-SALE-LOCK.md
  - docs/documents/3. tech/11-TECH-10-GLOBAL-SMOKE-UAT-EVIDENCE-RELEASE-GATEWAY-PRODUCTION-READINESS-CONTROL.md
owns:
  - product-master
  - sku-canonical
  - ingredient-canonical
  - recipe
  - formula-version
  - bom
  - product-activation
  - demand-mrp-operational-input
  - production-order
  - production-execution
  - qc-inspection
  - batch-release
  - warehouse
  - warehouse-receipt
  - inventory-ledger
  - stock-balance
  - sellable-status
  - trace-chain
  - public-trace
  - recall-case
  - sale-lock
  - operational-evidence
  - operational-form
  - misa-handoff-checkpoint
does_not_own:
  - quote
  - cart
  - official-order-creation
  - customer-confirmation
  - payment-confirmation
  - verified-revenue
  - facebook-channel-delivery
  - ai-response-instruction
  - ads-attribution
  - live-host-cue
  - ivr-result
consumer_rules:
  - business-platform may read product, public SKU, sellable, stock balance, trace, recall, and sale-lock contracts but must not mutate ops-core truth.
  - Inventory ledger is append/checkpoint truth and must not be edited through consumer-facing contracts.
  - Product Activation is not Sellable Status.
  - QC_PASS is not RELEASED.
  - MISA sync status does not rewrite Operational Truth.
compatibility:
  breaking_change: Weakening sale-lock, recall, inventory, release, traceability, or MISA checkpoint boundaries is breaking.
todos:
  - Source documents do not define every filter/projection for public product and operational status reads.
  - Source documents do not finalize all transition taxonomies for production, QC, recall, and sale lock.
